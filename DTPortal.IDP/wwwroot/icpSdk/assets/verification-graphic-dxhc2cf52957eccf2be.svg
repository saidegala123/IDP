<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Card -->
  <rect x="100" y="75" width="200" height="130" rx="12" fill="#ffffff"
    filter="drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.1))" />
  <!-- Card Elements -->
  <rect x="120" y="100" width="40" height="40" rx="6" fill="#f3f4f6" />
  <rect x="170" y="100" width="100" height="10" rx="5" fill="#e5e7eb" />
  <rect x="170" y="120" width="80" height="8" rx="4" fill="#e5e7eb" />
  <rect x="120" y="150" width="160" height="8" rx="4" fill="#e5e7eb" />
  <rect x="120" y="170" width="120" height="8" rx="4" fill="#e5e7eb" />
  <!-- Chip -->
  <rect x="260" y="170" width="20" height="20" rx="3" fill="#BE9B4A" />

  <!-- Identity decoration elements -->
  <circle cx="220" cy="60" r="25" fill="rgba(255, 255, 255, 0.1)" />
  <circle cx="180" cy="220" r="15" fill="rgba(255, 255, 255, 0.1)" />
  <circle cx="290" cy="180" r="10" fill="rgba(255, 255, 255, 0.1)" />
  <circle cx="120" cy="130" r="8" fill="rgba(255, 255, 255, 0.1)" />

  <!-- Security elements -->
  <path d="M70,150 Q90,130 100,150 Q110,170 130,160" stroke="rgba(255, 255, 255, 0.3)" fill="none"
    stroke-width="2" />
  <path d="M270,70 Q290,90 310,80 Q330,70 330,90" stroke="rgba(255, 255, 255, 0.3)" fill="none"
    stroke-width="2" />

  <!-- Shield decoration -->
  <path d="M200,30 L220,40 L220,65 C220,85 210,95 200,100 C190,95 180,85 180,65 L180,40 Z"
    fill="rgba(255, 255, 255, 0.2)" />
  <path d="M200,40 L215,48 L215,65 C215,80 207.5,87.5 200,90 C192.5,87.5 185,80 185,65 L185,48 Z"
    fill="rgba(255, 255, 255, 0.3)" />
  <path d="M200,230 L215,242 L215,265 C215,280 207.5,287.5 200,290 C192.5,287.5 185,280 185,265 L185,242 Z"
    fill="rgba(255, 255, 255, 0.1)" />
</svg>
